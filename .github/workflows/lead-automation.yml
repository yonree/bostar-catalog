name: Lead Automation Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: lead-automation-scheduler
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate scheduler secrets
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
        run: |
          test -n "$CRON_TARGET_URL"
          test -n "$CRON_SECRET"

      - name: Invoke lead automation endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
        run: |
          curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Accept: application/json" \
            "${CRON_TARGET_URL}"
